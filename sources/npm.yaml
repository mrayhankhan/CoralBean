# npm registry source spec for Coral.
# Package metadata from the public npm registry (registry.npmjs.org).
# Public API, no authentication required.
#
# Download statistics live on a different host (api.npmjs.org) and are
# therefore a separate source spec: see npm_downloads.yaml.
#
# Table:
#   packages — latest metadata for a package (GET /{package_name})
#
# Usage:
#   SELECT name, latest_version, repository__url, time__modified
#   FROM npm.packages
#   WHERE package_name = 'react';

name: npm
version: 0.1.0
dsl_version: 3
backend: http

inputs:
  NPM_REGISTRY_BASE:
    kind: variable
    default: https://registry.npmjs.org
    hint: Base URL for the npm registry

base_url: "{{input.NPM_REGISTRY_BASE}}"

test_queries:
  - SELECT name, latest_version FROM npm.packages WHERE package_name = 'react' LIMIT 1

tables:
  - name: packages
    description: >
      Package metadata from the npm registry. One row per package. Filter on
      package_name (required). Scoped packages like @types/node are supported.
    filters:
      - name: package_name
        required: true
    request:
      method: GET
      path: "/{{filter.package_name}}"
    response:
      rows_path: []
      row_strategy: direct
    columns:
      - name: package_name
        type: Utf8
        description: Package name queried (echoes the WHERE filter)
      - name: name
        type: Utf8
        description: Canonical package name
      - name: description
        type: Utf8
      - name: latest_version
        type: Utf8
        description: Version currently tagged 'latest'
        expr:
          kind: path
          path: ["dist-tags", latest]
      - name: homepage
        type: Utf8
      - name: repository__url
        type: Utf8
        description: Repository URL (typically git+https://github.com/owner/repo)
        expr:
          kind: path
          path: [repository, url]
      - name: time__created
        type: Utf8
        description: ISO timestamp of the package's first publish
        expr:
          kind: path
          path: [time, created]
      - name: time__modified
        type: Utf8
        description: ISO timestamp of the most recent publish (any version)
        expr:
          kind: path
          path: [time, modified]
      - name: maintainers
        type: Json
        description: Array of maintainer {name,email} objects
      - name: keywords
        type: Json
        description: Array of keyword strings
      - name: dist_tags
        type: Json
        description: Object of {tag → version}
        expr:
          kind: path
          path: ["dist-tags"]
      - name: license
        type: Utf8
      - name: bugs__url
        type: Utf8
        description: Issue tracker URL
        expr:
          kind: path
          path: [bugs, url]
      - name: readme
        type: Utf8
        description: README markdown for the latest published version
